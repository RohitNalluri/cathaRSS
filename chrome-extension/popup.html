<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    .header {
      background: #313244;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #45475a;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #cba6f7;
    }

    .logo { font-size: 20px; }

    .body { padding: 14px 16px; }

    .status {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status.connected { background: #a6e3a120; color: #a6e3a1; }
    .status.disconnected { background: #f38ba820; color: #f38ba8; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .connected .dot { background: #a6e3a1; }
    .disconnected .dot { background: #f38ba8; }

    .page-info {
      background: #313244;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .page-title {
      font-size: 12px;
      font-weight: 600;
      color: #cdd6f4;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-url {
      font-size: 10px;
      color: #6c7086;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .source-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #313244;
      color: #cdd6f4;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .source-btn.active {
      border-color: #cba6f7;
      background: #cba6f720;
      color: #cba6f7;
    }

    .source-btn:hover { border-color: #cba6f7; }

    .selection-note {
      font-size: 10px;
      color: #6c7086;
      margin-bottom: 12px;
      padding: 6px 10px;
      background: #313244;
      border-radius: 6px;
    }

    .selection-note.has-selection { color: #a6e3a1; background: #a6e3a110; }

    .clip-btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #cba6f7;
      color: #1e1e2e;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clip-btn:hover { background: #d0b4f9; transform: translateY(-1px); }
    .clip-btn:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; transform: none; }

    .feedback {
      font-size: 11px;
      text-align: center;
      margin-top: 10px;
      min-height: 16px;
      color: #a6e3a1;
    }

    .feedback.error { color: #f38ba8; }

    .port-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }

    .port-row label { font-size: 10px; color: #6c7086; }
    .port-row input {
      flex: 1;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 4px;
      color: #cdd6f4;
      font-size: 10px;
      padding: 4px 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">📚</span>
    <h1>Read It All</h1>
  </div>

  <div class="body">
    <div id="status" class="status disconnected">
      <div class="dot"></div>
      <span id="status-text">Checking connection...</span>
    </div>

    <div class="page-info">
      <div class="page-title" id="page-title">Loading...</div>
      <div class="page-url" id="page-url"></div>
    </div>

    <div class="source-row">
      <button class="source-btn active" data-source="Clipping">📎 Clipping</button>
      <button class="source-btn" data-source="Substack">📬 Substack</button>
      <button class="source-btn" data-source="RSS">🗞 RSS</button>
    </div>

    <div class="selection-note" id="selection-note">
      Select text on the page to clip just that excerpt.
    </div>

    <button class="clip-btn" id="clip-btn" disabled>
      Save to Vault
    </button>

    <div class="feedback" id="feedback"></div>

    <div class="port-row">
      <label>Port:</label>
      <input type="number" id="port-input" value="27124" min="1024" max="65535">
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
